name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg (Windows)
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          Get-ChildItem -Path ffmpeg_extracted -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination .

      - name: Build with PyInstaller (Windows)
        run: >
          pyinstaller --name "Transcriberio" --onedir --noconfirm --noconsole
          --collect-all gradio --collect-all yt_dlp --collect-all safehttpx --collect-all groovy
          --add-binary "ffmpeg.exe;." 
          main.py

      - name: Zip the Application
        run: Compress-Archive -Path dist\Transcriberio\* -DestinationPath Transcriberio_${{ github.ref_name }}_Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Transcriberio_${{ github.ref_name }}_Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg (Linux)
        run: |
          wget -qO ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf ffmpeg.tar.xz
          find . -name "ffmpeg" -type f -exec cp {} . \;
          chmod +x ffmpeg

      - name: Build with PyInstaller (Linux)
        run: >
          pyinstaller --name "Transcriberio" --onedir --noconfirm --noconsole
          --collect-all gradio --collect-all yt_dlp --collect-all safehttpx --collect-all groovy
          --add-binary "ffmpeg:." 
          main.py

      - name: Tar the Application
        run: tar -czvf Transcriberio_${{ github.ref_name }}_Linux.tar.gz -C dist Transcriberio

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Transcriberio_${{ github.ref_name }}_Linux.tar.gz

  publish-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "Transcriberio ${{ github.ref_name }}"
          files: |
            final_artifacts/Transcriberio_${{ github.ref_name }}_Windows.zip
            final_artifacts/Transcriberio_${{ github.ref_name }}_Linux.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
